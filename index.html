<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riego Colombia</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1206/1206405.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <span class="navbar-brand mx-auto mb-0 h1">Reto Riego Colombia</span>
    </nav>

    <body>
        <div>
            <h1>AGROCLIMA</h1>
            <h3>INTELIGENTE</h3>
            <form action="calculadora.php" method="post">
                <label for="num1">Valor de tu factura actual</label>
                <input type="number" id="num1" name="num1" required><br><br>

                <label for="num2">¿Aproximadamente cuantas horas riegas al día?</label>
                <input type="number" id="num2" name="num2" required><br><br>

                <label for="num3">¿Cuanto tiempo regó el sistema automatico?</label>
                <input type="number" id="num3" name="num3" required><br><br>

                <!-- SLIDER CULTIVO -->
                <label for="cultivo">Tipo de cultivo</label>
                <div class="slider-opciones">
                    <input type="range" id="cultivo" name="cultivo" min="0" max="4" step="1" value="0" oninput="actualizarCultivo(this.value)">
                    <div class="slider-etiquetas">
                        <span>Papa</span>
                        <span>Yuca</span>
                        <span>Maíz</span>
                        <span>Café</span>
                        <span>Arroz</span>
                    </div>
                    <div class="slider-valor" id="valorCultivo">Papa</div>
                </div><br>

                <!-- SLIDER CLIMA -->
                <label for="clima">Tipo de clima de tu área</label>
                <div class="slider-opciones">
                    <input type="range" id="clima" name="clima" min="0" max="4" step="1" value="0" oninput="actualizarClima(this.value)">
                    <div class="slider-etiquetas">
                        <span>Cálido</span>
                        <span>Seco</span>
                        <span>Templado</span>
                        <span>Frío</span>
                        <span>Húmedo</span>
                    </div>
                    <div class="slider-valor" id="valorClima">Cálido</div>
                </div><br><br>

            </form>
            <button type="button" onclick="calcular()">Calcular</button>

            <p>Resultado: <span id="resultado"></span></p>

        </div>

        <script>
            const cultivos = ['Papa', 'Yuca', 'Maíz', 'Café', 'Arroz'];
            const climas   = ['Cálido', 'Seco', 'Templado', 'Frío', 'Húmedo'];

            function actualizarCultivo(v) {
                document.getElementById('valorCultivo').textContent = cultivos[v];
            }
            function actualizarClima(v) {
                document.getElementById('valorClima').textContent = climas[v];
            }

            function calcular(){
                let nume1 = document.getElementById('num1').value;
                let nume2 = document.getElementById('num2').value;
                let nume3 = document.getElementById('num3').value;

                let resultado = (parseFloat(nume1) * parseFloat(nume3)) / parseFloat(nume2);
                let porcentaje = (resultado / parseFloat(nume1)) * 100;

                document.getElementById("resultado").innerText = "Tu nuevo valor de la factura será: $" + resultado.toFixed(2) + " pesos, estas ahorrando un "  + porcentaje.toFixed(2) + "% de tu factura actual.";
            }
        </script>
    </body>
</body>
</html>
